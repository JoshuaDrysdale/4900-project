<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="/signup.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>

    <div class="brandingContainer">
        <h1 class="appName">🚗 RHA</h1>
        <p class="tagline">Your ride, your way.</p>
    </div>

    <div class="signupContainer">
        <h1 id="signupHeading">Sign Up</h1>
        <p class="welcomeText">Create your account to get started.</p>
        <form id="signupForm">
            <input name="username" placeholder="Username" required>
            <input name="email" placeholder="E-mail" required>
            <input name="password" type="password" id="passwordInput" placeholder="Password" required>
            <div class="strengthBar">
            <div class="strengthFill" id="strengthFill"></div>
            </div>
            <p class="strengthText" id="strengthText"></p>
            <input name="date_of_birth" id="date_of_birth" placeholder="Date of Birth" readonly required>
            <button type="submit" id="submitButtonSignup">Sign Up</button>
        </form>
        <p>Already have an account?</p>
    <button class="loginButton" onclick="window.location.href='/login'">Login</button>    </div>

    <script src="/signup.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
    flatpickr("#date_of_birth", {
    dateFormat: "Y-m-d",       // format sent to the database, change as needed
    altInput: true,             // shows a friendly format to the user
    altFormat: "F j, Y",        // e.g. January 15, 2000
    maxDate: "today",           // can't select a future date
    yearRange: [1900, new Date().getFullYear()], // sensible year range
  });
</script>

<script>
  document.getElementById('passwordInput').addEventListener('input', function() {
    const val = this.value;
    const fill = document.getElementById('strengthFill');
    const text = document.getElementById('strengthText');
    //very basic password strength checker, at lesat one uppercase letter
    //a number, length of 8, and a special letter for max strength, 
    let strength = 0;
    if (val.length >= 8) strength++;
    // rule 1: is the password at least 8 characters long?
    // "hi" → fails, "mypassword" → passes ✓
    if (/[A-Z]/.test(val)) strength++;
    // rule 2: does it contain at least one UPPERCASE letter?
    // "mypassword" → fails, "Mypassword" → passes ✓
    if (/[0-9]/.test(val)) strength++;
    // rule 3: does it contain at least one NUMBER?
    // "Mypassword" → fails, "Mypassword1" → passes ✓
    if (/[^A-Za-z0-9]/.test(val)) strength++;
    // rule 4: does it contain a special character? (anything that is NOT a-z, A-Z, or 0-9)
    // "Mypassword1" → fails, "Mypassword1!" → passes ✓

    //Change rules as needed, as with length, more characters needed, etc
    const levels = [
      { width: '0%',   color: '#e0e0e0', label: '' },
      { width: '25%',  color: '#e74c3c', label: 'Weak' },
      { width: '50%',  color: '#e67e22', label: 'Fair' },
      { width: '75%',  color: '#f1c40f', label: 'Good' },
      { width: '100%', color: '#2ecc71', label: 'Strong' },
    ];

    fill.style.width = levels[strength].width;
    fill.style.background = levels[strength].color;
    text.textContent = levels[strength].label;
    text.style.color = levels[strength].color;
  });
</script>

</body>
</html>
