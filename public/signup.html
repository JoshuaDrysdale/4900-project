<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="/signup.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
        <!-- Branding section (app name + tagline) -->

    <div class="brandingContainer">
        <h1 class="appName">🚗 RHA</h1>
        <p class="tagline">Your ride, your way.</p>
    </div>

        <!-- Main signup form container -->

    <div class="signupContainer">
        <h1 id="signupHeading">Sign Up</h1>
        <p class="welcomeText">Create your account to get started.</p>
        
        <!-- Signup form (validation handled in signup.js) -->

        <form id="signupForm">

        <input name="username" placeholder="Username" required>
        <div class="errorMsg" id="usernameError"></div>

        <input name="email" type="email" placeholder="E-mail" required>
        <div class="errorMsg" id="emailError"></div>
        
        <!-- Password input with toggle + copy functionality -->
       
<div class="passwordWrapper" id="passwordWrapper">
    <input name="password" type="password" id="passwordInput" placeholder="Password" required>
    <button type="button" class="togglePassword" id="togglePasswordBtn" onclick="togglePassword()">Show</button>
    <button type="button" class="copyPassword" id="copyPasswordBtn" onclick="copyPassword()">📋</button>
</div>
<div class="errorMsg" id="passwordError"></div>

<div class="strengthBar">
    <div class="strengthFill" id="strengthFill"></div>
</div>
<p class="strengthText" id="strengthText"></p>

<ul class="passwordRequirements">
    <li id="req-length">✖ At least 8 characters</li>
    <li id="req-upper">✖ At least one uppercase letter</li>
    <li id="req-number">✖ At least one number</li>
    <li id="req-special">✖ At least one special character (!@#$...)</li>
</ul>

<div class="passwordWrapper" id="confirmPasswordWrapper">
    <input name="confirmPassword" type="password" id="confirmPasswordInput" placeholder="Confirm Password" required>
    <button type="button" class="togglePassword" id="toggleConfirmBtn" onclick="toggleConfirmPassword()">Show</button>
</div>
<div class="errorMsg" id="confirmPasswordError"></div>
        
<!-- Date of birth input (uses Flatpickr, readonly prevents manual typing) -->
    
        <input name="date_of_birth" id="date_of_birth" placeholder="Date of Birth" readonly required>
        <div class="errorMsg" id="dobError"></div>

        <div class="errorMsg" id="formError"></div>
        <button type="submit" id="submitButtonSignup">Sign Up</button>
        </form>

        <!-- Redirect to login page -->

        <p>Already have an account?</p>
        <button class="loginButton" onclick="window.location.href='/login'">Login</button>    
    </div>   
        <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
        <script src="/signup.js"></script>

</body>
</html>
