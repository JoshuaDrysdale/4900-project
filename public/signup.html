<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="/signup.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>

    <div class="brandingContainer">
        <h1 class="appName">🚗 RHA</h1>
        <p class="tagline">Your ride, your way.</p>
    </div>

    <div class="signupContainer">
        <h1 id="signupHeading">Sign Up</h1>
        <p class="welcomeText">Create your account to get started.</p>

        <form id="signupForm">

        <input name="username" placeholder="Username" required>
        <div class="errorMsg" id="usernameError"></div>

        <input name="email" placeholder="E-mail" required>
        <div class="errorMsg" id="emailError"></div>
          
        <div class="passwordWrapper">  
          <input name="password" type="password" id="passwordInput" placeholder="Password" required>
          <button type="button" class="togglePassword" onclick="togglePassword()">👁</button>
        </div>
        <div class="errorMsg" id="passwordError"></div>

        <div class="strengthBar">
            <div class="strengthFill" id="strengthFill"></div>
        </div>
        
        <p class="strengthText" id="strengthText"></p>
        <div class="passwordWrapper">
    <input name="confirmPassword" type="password" id="confirmPasswordInput" placeholder="Confirm Password" required>
    <button type="button" class="togglePassword" onclick="toggleConfirmPassword()">👁</button>
</div>
<div class="errorMsg" id="confirmPasswordError"></div>
        
        <input name="date_of_birth" id="date_of_birth" placeholder="Date of Birth" readonly required>
        <div class="errorMsg" id="dobError"></div>

        <div class="errorMsg" id="formError"></div>
        <button type="submit" id="submitButtonSignup">Sign Up</button>
        </form>
        <p>Already have an account?</p>
        <button class="loginButton" onclick="window.location.href='/login'">Login</button>    </div>

        <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
        <script src="/signup.js" defer></script>

</body>
</html>
