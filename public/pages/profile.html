<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — RHA</title>
  <link rel="stylesheet" href="../css/menu.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚗</text></svg>">
</head>
<body>

    <div class="page-wrapper">

      <div class="page-header">
        <button id="homeBtn" class="back-btn">← Back</button>
        <h1 class="page-title">🚗 RHA</h1>
        <button id="darkModeBtn" class="icon-btn">🌙</button>
      </div>

      <div class="page-card">
        <div class="profile-avatar">👤</div>
        <h2 class="profile-name" id="displayUsername">Loading...</h2>
        <p class="profile-email" id="displayEmail">Loading...</p>
      </div>

      <div class="page-card">
        <h3 class="card-title">Edit Profile</h3>

      <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" id="username" placeholder="Your username">
      <p id="usernameError" class="form-error" style="display:none"></p>
      </div>

    <div class="form-group">
    <label class="form-label">Email</label>
    <input class="form-input" type="email" id="email" placeholder="Your email">
    <p id="emailError" class="form-error" style="display:none"></p>
    </div>
        <p class="form-success" id="updateSuccess"></p>
        <p class="form-error" id="updateError"></p>

        <button class="btn-primary" id="updateProfile">Save Changes</button>
      </div>

      <div class="page-card">
  <h3 class="card-title">Change Password</h3>

  <div class="form-group">
    <label class="form-label">Current Password</label>
    <input class="form-input" type="password" id="currentPassword" placeholder="Your current password">
    <p id="currentPasswordError" class="form-error" style="display:none"></p>
  </div>

  <div class="form-group">
    <label class="form-label">New Password</label>
    <input class="form-input" type="password" id="newPassword" placeholder="Your new password">
    <p id="newPasswordError" class="form-error" style="display:none"></p>
  </div>

  <div class="form-group">
    <label class="form-label">Confirm New Password</label>
    <input class="form-input" type="password" id="confirmNewPassword" placeholder="Confirm new password">
    <p id="confirmNewPasswordError" class="form-error" style="display:none"></p>
  </div>

  <p class="form-success" id="passwordSuccess"></p>
  <p class="form-error" id="passwordError"></p>

  <button class="btn-primary" id="updatePassword">Update Password</button>
</div>

      <div class="page-card danger-card">
        <h3 class="card-title">Account</h3>
        <button class="btn-danger" id="logoutBtn">Logout</button>
      </div>

    </div>

    <script src="../js/profile.js"></script>
    
  </body>
  </html>
