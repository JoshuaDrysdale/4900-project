<!DOCTYPE html>
<html lang="en">
<head>
    <!--//routing machine URLs for routing -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride Share App</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.0.3/leaflet.css"><!--leaflet geocoder-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-geocoder-mapzen/1.9.4/leaflet-geocoder-mapzen.css"><!--leaflet geocoder-->
</head>
<body>
<h1>Ride-Hailing-Aggregator</h1>

<div class="search-container">
  <div class="inputs-row">
    <!-- Pickup -->
    <div class="autocomplete-container">
      <input id="pickupInput" placeholder="Pickup address" autocomplete="off">
        <button onclick="setPickup()">Set Pickup</button>
      
      <ul id="pickupSuggestions" class="suggestions"></ul>
    </div>
    <button id="swapLocations">⇅ Swap</button>
    <!-- Dropoff -->
    <div class="autocomplete-container">
      <input id="dropoffInput" placeholder="Dropoff address" autocomplete="off">
        <button onclick="setDropoff()">Set Dropoff</button>

      <ul id="dropoffSuggestions" class="suggestions"></ul>
    </div>
  </div>



</div>

<button id="resetBtn">Reset Pickup & Dropoff</button>


    <!--//routing machine URLs for routing 
    Commented out since there is no functionality yet, reduced clutter
<button id="setLocClick">Set Locations by Click</button>
<button id="setLocAddress">Set Locations by Address</button>
-->



<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.0.3/leaflet.js"></script><!--leaflet geocoder-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-geocoder-mapzen/1.9.4/leaflet-geocoder-mapzen.js"></script><!--leaflet geocoder-->
<script src="map.js"></script>

</body>
</html>
