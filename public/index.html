<!DOCTYPE html>
<html lang="en">
<head>
  
    <!--//routing machine URLs for routing -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="style.css"/>
    <title>RHA</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚗</text></svg>">  </head>
<body>

<div class="mapBranding">
    <span class="mapAppName">🚗 RHA</span>
    <span class="mapTagline">Find your best ride</span>
    <button id="logoutBtn" class="logout-button" title="Logout"> Logout</button>
</div>

<!-- =========================================================================
     MODE TOGGLE — switches between typing an address and clicking the map
     ========================================================================= -->
<div class="mode-controls">
  <button id="addressModeBtn" class="mode-btn active">✏️ Enter Address</button>
  <button id="mapModeBtn"     class="mode-btn">🗺 Select on Map</button>
</div>

<!-- =========================================================================
     SEARCH PANEL — pickup / dropoff address inputs with autocomplete
     ========================================================================= -->
<div class="search-container">
  <div class="inputs-row">

    <!-- Pickup input -->
<div class="autocomplete-container">
  <div class="input-with-star">
    <input id="pickupInput" placeholder="Pickup address" autocomplete="off">
    <button class="star-btn" id="pickupStarBtn" title="Saved locations">☆</button>
  </div>
  <button onclick="setPickup()">Confirm Pickup</button>
  <ul id="pickupSuggestions" class="suggestions"></ul>
  <!-- Saved locations popover -->
  <div class="saved-popover" id="pickupPopover">
    <div class="saved-popover-header">
      <span>Saved Locations</span>
      <button class="save-current-btn" id="pickupSaveCurrentBtn">+ Save current</button>
    </div>
    <ul class="saved-popover-list" id="pickupSavedList"></ul>
    <p class="saved-popover-empty" id="pickupPopoverEmpty">No saved locations yet.</p>
  </div>
</div>

<!-- Swap button — reverses pickup and dropoff -->
<button id="swapLocations">⇅ Swap</button>

<!-- Dropoff input -->
<div class="autocomplete-container">
  <div class="input-with-star">
    <input id="dropoffInput" placeholder="Dropoff address" autocomplete="off">
    <button class="star-btn" id="dropoffStarBtn" title="Saved locations">☆</button>
  </div>
  <button onclick="setDropoff()">Confirm Dropoff</button>
  <ul id="dropoffSuggestions" class="suggestions"></ul>
  <!-- Saved locations popover -->
  <div class="saved-popover" id="dropoffPopover">
    <div class="saved-popover-header">
      <span>Saved Locations</span>
      <button class="save-current-btn" id="dropoffSaveCurrentBtn">+ Save current</button>
    </div>
    <ul class="saved-popover-list" id="dropoffSavedList"></ul>
    <p class="saved-popover-empty" id="dropoffPopoverEmpty">No saved locations yet.</p>
  </div>
</div>

    <div id="routeInfo" style="text-align:center; font-size: 14px; color: #555; margin-top: 6px;"></div>

  </div>
</div>


<!-- History View — Show The Users Recent History -->
<!--
<div class="trip-history-panel">
  <div class="trip-history-header">
    <h3>Recent Trips</h3>
  </div>
  <div id="tripHistoryList" class="trip-history-list">
    <p class="trip-history-empty">No recent trips yet.</p>
    </div>
  </div>
  -->

<!-- Reset button — clears all markers and the drawn route -->
<button id="resetBtn">Clear Trip</button>

<!-- Recenter / My Location button -->
<button id="recenterBtn" title="My Location">📍</button>

<button id="settingsBtn">⚙️</button>
<button id="profileBtn">👤</button>

<div id="loadingIndicator" style="display:none;">
    <div class="spinner"></div>
    <p>Finding route...</p>
</div>

<!-- =========================================================================
     GEOLOCATION MODAL
     Shown when the browser resolves the user's current position.
     User can choose to set it as their pickup or just recenter the map.
     ========================================================================= -->
<div id="geoModal">
  <div id="geoModalCard">
    <div id="geoModalIcon">📍</div>
    <p id="geoModalTitle">Your location found</p>
    <p id="geoAddressLabel"></p>
    <div id="geoModalBtns">
      <button id="geoSetPickup">🟢 Set as Pickup</button>
      <button id="geoRecenterOnly">No Thanks</button>
    </div>
  </div>
</div>

<!-- Save Location Modal -->
<div id="saveLocationModal" class="slm-overlay">
  <div class="slm-card">
    <h3 class="slm-title">Save Location</h3>
    <p class="slm-address" id="slmAddress"></p>
    <label class="slm-label" for="slmNameInput">Give it a name</label>
    <input class="slm-input" id="slmNameInput" placeholder='e.g. "Home", "Work", "Gym"' maxlength="50" autocomplete="off">
    <p class="slm-error" id="slmError"></p>
    <div class="slm-btns">
      <button class="slm-cancel" id="slmCancel">Cancel</button>
      <button class="slm-save"   id="slmSave">Save</button>
    </div>
  </div>
</div>


<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="map.js"></script>

</body>
</html>
