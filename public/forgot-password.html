<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - RHA</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }


    .forgot-password-container {
      max-width: 400px;
      width: 90%;
      margin: 60px auto;
      padding: 40px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      position: relative;
      z-index: 1;
    }

    .forgot-password-container h2 {
      text-align: center;
      margin-bottom: 10px;
      color: #333;
      font-size: 24px;
    }

    .forgot-password-container > p {
      text-align: center;
      color: #666;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .error-message {
      color: #c62828;
      font-size: 13px;
      margin-top: 5px;
      display: none;
    }

    .success-box {
      display: none;
      background: #e8f5e9;
      color: #2e7d32;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      text-align: center;
      border-left: 4px solid #2e7d32;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .submit-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
    }

    .back-link a:hover {
      color: #764ba2;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="forgot-password-container">
    <h2>🔑 Reset Password</h2>
    <p>Enter your email to receive a reset link.</p>

    <div class="success-box" id="successBox">
      ✓ Check your email. Link expires in 30 minutes.
    </div>

    <form id="forgotPasswordForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
        <div class="error-message" id="emailError"></div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        Send Reset Link
      </button>
    </form>

    <div class="back-link">
      <a href="/login.html">← Back to Login</a>
    </div>
  </div>

  <script src="background.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('forgotPasswordForm')
        .addEventListener('submit', handleForgotPassword);
    });

    async function handleForgotPassword(e) {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const error = document.getElementById('emailError');
      const btn = document.getElementById('submitBtn');

      console.log('Form submitted with email:', email);  // DEBUG

      try {
        btn.disabled = true;

        const res = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        console.log('Response status:', res.status);  // DEBUG
        console.log('Response ok:', res.ok);  // DEBUG

        if (res.ok) {
          document.getElementById('forgotPasswordForm').style.display = 'none';
          document.getElementById('successBox').style.display = 'block';
        } else {
          const data = await res.json();
          error.textContent = data.error || 'Failed to send email';
          error.style.display = 'block';
        }
      } catch (err) {
        console.error('Error:', err);  // DEBUG
        error.textContent = 'Error occurred: ' + err.message;
        error.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
