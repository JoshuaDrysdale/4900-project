<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - RHA</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .reset-password-container {
      max-width: 450px;
      width: 90%;
      margin: 60px auto;
      padding: 30px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    .error-box {
      display: none;
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 15px;
      border-left: 4px solid #c62828;
    }

    .success-message {
      display: none;
      background: #e8f5e9;
      color: #2e7d32;
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 15px;
      border-left: 4px solid #2e7d32;
      text-align: center;
    }

    .success-message a {
      color: #1976d2;
      text-decoration: none;
      font-weight: bold;
    }

    .success-message a:hover {
      text-decoration: underline;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input[type="password"] {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="reset-password-container">
    <h2>New Password</h2>

    <div id="errorBox" class="error-box"></div>
    <div id="successMessage" class="success-message">
      Password reset! <a href="/login.html">Login</a>
    </div>

    <form id="resetForm">
      <input type="password" id="newPassword" placeholder="New Password" required>
      <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
      <button type="submit" id="btn">Reset Password</button>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    let token = params.get('token');
    const email = params.get('email');

    // Make sure token isn't double-encoded
    if (token && token.includes('%')) {
      token = decodeURIComponent(token);
    }

    console.log('Token from URL (first 20):', token ? token.substring(0, 20) : 'MISSING');

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('resetForm')
        .addEventListener('submit', handleResetPassword);
    });

    async function handleResetPassword(e) {
      e.preventDefault();

      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        return showError('Passwords do not match');
      }

      try {
        console.log('Sending token (first 20):', token.substring(0, 20));
        
        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, email, newPassword })
        });

        if (res.ok) {
          document.getElementById('resetForm').style.display = 'none';
          document.getElementById('successMessage').style.display = 'block';
        } else {
          const data = await res.json();
          showError(data.error || 'Reset failed');
        }
      } catch (err) {
        showError('Error occurred: ' + err.message);
      }
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.style.display = 'block';
    }
  </script>
</body>
</html>
